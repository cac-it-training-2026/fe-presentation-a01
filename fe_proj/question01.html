<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML/CSS 4択問題</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>
	 <div class="quiz-container">
            <h3 class="quiz-question">問題1: 機械学習における「学習」に最も近い筋トレはどれか。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. ジムに入会して満足する
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. YouTubeで筋トレ動画だけ見る
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 継続してトレーニングをする
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. プロテインを眺める
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：3.継続してトレーニングする</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        機械学習も筋トレも「実際に繰り返す」ことで成長します。動画を見るだけでは腹筋は割れません。それと同様にAIもデータを見るだけでは賢くなりません。
                    </p>
                </div>
            </details>
            <ul style="text-align: right; list-style: none;">
            	<li><a href="question02.html">問題2→</a></li>
            </ul>
        </div>

</body>
</html>
