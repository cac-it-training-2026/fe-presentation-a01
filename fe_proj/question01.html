<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML/CSS 4択問題</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>
	 <div class="quiz-container">
            <h3 class="quiz-question">問題1: 機械学習の概要について<br>
            以下の4つから機械学習の手法について誤りを選んでください。
				
			</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. 教師あり
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. 教師なし
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 強化
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. 推論
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：4.推論</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        手法は、教師あり、教師なし、強化です。<br>
                        推論は機械学習の仕組みとなります。
                    </p>
                </div>
            </details>
        </div>

</body>
</html>
