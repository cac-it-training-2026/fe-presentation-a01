<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML/CSS 4択問題</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>
	 <div class="quiz-container">
            <h3 class="quiz-question">問題1: 機械学習における「学習」に最も近い筋トレはどれか。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. ジムに入会して満足する
                    <span class="bad-message">不正解</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. YouTubeで筋トレ動画だけ見る
                    <span class="bad-message">不正解</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 継続してトレーニングをする
                    <span class="good-message">正解</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. プロテインを眺める
                    <span class="bad-message">不正解</span>
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：3.継続してトレーニングする</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
機械学習における「学習」とは、データを使ってモデルの精度を高めるために繰り返し処理を行うことです。これは筋トレでいうと、実際にトレーニングを継続して筋肉を成長させることに相当します。
動画を見るだけやプロテインを眺めるだけでは成果が出ないのと同じように、AIもデータを見ただけでは賢くならず、繰り返し学習することで精度が向上します。

                    </p>
                </div>
            </details>
            <ul style="text-align: right; list-style: none;">
            	<li><a href="question02.html">ニューラルネットワークについて→</a></li>
            </ul>
        </div>

</body>
</html>
