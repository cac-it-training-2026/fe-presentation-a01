<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題2: ニューラルネットワークで、各ニューロン間のつながりの強さを表すものはどれか</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" id="1" />
                    	1. バイアス
                    <span class="bad-message">不正解</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 
                    	2. 重み
                    <span class="good-message">正解</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 
                    	3. 活性化関数
                    <span class="bad-message">不正解</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. エポック
                    <span class="bad-message">不正解</span>
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. 重み</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        ニューラルネットワークでは、各ニューロン同士が線でつながっています。<br>
                        その線には「どれくらい影響を与えるか」という値が設定されており、それを 重み（Weight） と呼びます。
                    </p>
                </div>
            </details>
            <ul style="text-align: right; list-style: none;">
            	<li><a href="question03.html">← 深夜のラーメン診断AI</a></li>
            </ul>
        </div>
    </body>
</html>
